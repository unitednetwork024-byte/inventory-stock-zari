name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install Web Dependencies
      run: |
        cd web
        npm ci

    - name: Build Next.js App
      run: |
        cd web
        npm run build > ../next_build.log 2>&1 || (cat ../next_build.log && exit 1)

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Sync Capacitor
      run: |
        cd web
        npx cap sync android > ../cap_sync.log 2>&1 || (cat ../cap_sync.log && exit 1)

    - name: Build APK with Gradle
      run: |
        cd web/android
        chmod +x gradlew
        ./gradlew assembleDebug > ../../gradle_build.log 2>&1 || (cat ../../gradle_build.log && exit 1)

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: web/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          next_build.log
          cap_sync.log
          gradle_build.log
